<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Flashcards</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="topnav">
        <a href="index.html">Home</a>
        <a href="create.html">Create</a>
        <a href="timer.html">Timer</a>
        <a href="tips.html">Study Tips</a>
    </div>

    <div class="container">
        <h1>Create Flashcards</h1>
        <p>Enter a question and answer, then click the card to flip it.</p>

        <input id="q" placeholder="Question">
        <input id="a" placeholder="Answer">
        <button id="createBtn">Create Card</button>

        <div class="card-container">
            <div id="flashcard" class="card">
                <div class="card-face card-front" id="cardFront">Question will appear here</div>
                <div class="card-face card-back" id="cardBack">Answer will appear here</div>
            </div>
        </div>

        <div class="controls">
            <button id="prevBtn">Previous</button>
            <span id="cardCounter">0/0</span>
            <button id="nextBtn">Next</button>
        </div>

        <button id="clearBtn" style="margin-top:20px; background-color: #ff4444;">Clear All Cards</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
